<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hatty's Tools</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700;9..144,900&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold:       #f0a500;
    --gold-light: #fbbf24;
    --gold-glow:  rgba(240, 165, 0, 0.6);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #020617;
    font-family: 'Space Grotesk', sans-serif;
  }

  /* ── BACKGROUND IMAGE ───────────────────────────── */
  #bg-image {
    position: fixed;
    inset: 0;
    background:
      url('hattys-tool.png') center center / contain no-repeat;
    opacity: 0;
    filter: brightness(0.18) saturate(0.6);
    transform: scale(1.06);
    animation: bgReveal 2.4s ease-out 0.3s forwards;
  }

  @keyframes bgReveal {
    to { opacity: 1; transform: scale(1); }
  }

  /* ── VIGNETTE OVERLAY ───────────────────────────── */
  #vignette {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at center, transparent 28%, rgba(2,6,23,0.85) 75%),
      linear-gradient(180deg, rgba(2,6,23,0.55) 0%, transparent 25%, transparent 75%, rgba(2,6,23,0.7) 100%);
    pointer-events: none;
    z-index: 1;
  }

  /* ── NOISE GRAIN ────────────────────────────────── */
  #grain {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 180px 180px;
  }

  /* ── CENTER STAGE ───────────────────────────────── */
  #stage {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 20px;
    text-align: center;
  }

  /* ── "Welcome To:" ──────────────────────────────── */
  #welcome {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(1rem, 3vw, 1.55rem);
    font-weight: 600;
    color: rgba(224, 231, 255, 0.75);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(8px);
    animation: fadeUp 1.1s ease-out 1.4s forwards;
    margin-bottom: 14px;
  }

  /* ── "Hatty's Tools" ────────────────────────────── */
  #title {
    font-family: 'Fraunces', serif;
    font-size: clamp(3.2rem, 12vw, 9rem);
    font-weight: 900;
    line-height: 1;
    color: var(--gold);
    text-shadow:
      0 0 30px rgba(240,165,0,0.5),
      0 0 80px rgba(240,165,0,0.2);
    opacity: 0;
    animation: fadeUp 1.2s ease-out 2.2s forwards;
    margin-bottom: 10px;
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 0.18em;
    flex-wrap: wrap;
  }

  #title .glitch-word {
    position: relative;
    display: inline-block;
  }

  /* The "Tools" part - no glitch */
  #title .plain {
    color: #fff;
  }

  /* ── "Created by HattyHats" ─────────────────────── */
  #byline {
    font-size: clamp(0.85rem, 2.2vw, 1.15rem);
    font-weight: 500;
    color: rgba(200, 210, 230, 0.7);
    letter-spacing: 0.12em;
    opacity: 0;
    animation: fadeUp 1s ease-out 3.1s forwards;
    margin-bottom: 52px;
  }

  #byline .glitch-word {
    position: relative;
    display: inline-block;
    color: var(--gold-light);
    font-weight: 700;
  }

  /* ── ENTER BUTTON ───────────────────────────────── */
  #enter-btn {
    opacity: 0;
    animation: fadeUp 1s ease-out 3.9s forwards;
    position: relative;
    display: inline-block;
    cursor: pointer;
    border: none;
    background: transparent;
    padding: 0;
  }

  #enter-btn .btn-inner {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 16px 48px;
    border-radius: 999px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #111;
    background: linear-gradient(135deg, var(--gold) 0%, #d99200 100%);
    border: 2px solid transparent;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow:
      0 0 18px rgba(240,165,0,0.5),
      0 0 50px rgba(240,165,0,0.2),
      0 0 90px rgba(240,165,0,0.1);
    animation: btnPulse 2.4s ease-in-out infinite 4.5s;
    text-decoration: none;
  }

  #enter-btn:hover .btn-inner {
    transform: scale(1.06);
    box-shadow:
      0 0 28px rgba(240,165,0,0.75),
      0 0 70px rgba(240,165,0,0.4),
      0 0 120px rgba(240,165,0,0.15);
  }

  #enter-btn:active .btn-inner {
    transform: scale(0.97);
  }

  @keyframes btnPulse {
    0%, 100% { box-shadow: 0 0 18px rgba(240,165,0,0.5), 0 0 50px rgba(240,165,0,0.2); }
    50%       { box-shadow: 0 0 34px rgba(240,165,0,0.85), 0 0 80px rgba(240,165,0,0.45), 0 0 130px rgba(240,165,0,0.2); }
  }

  /* Arrow inside button */
  .btn-arrow {
    font-size: 1.1em;
    transition: transform 0.2s;
  }
  #enter-btn:hover .btn-arrow { transform: translateX(4px); }

  /* ── SHARED FADE-UP ─────────────────────────────── */
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── GLITCH EFFECT ──────────────────────────────── */
  .glitch-word::before,
  .glitch-word::after {
    content: attr(data-text);
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    overflow: hidden;
    pointer-events: none;
  }

  .glitch-word::before {
    left: 2px;
    color: #ff4ec7;
    clip-path: inset(0 0 60% 0);
    animation: glitchTop 5s steps(1) infinite;
  }

  .glitch-word::after {
    left: -2px;
    color: #00e5ff;
    clip-path: inset(60% 0 0 0);
    animation: glitchBot 5s steps(1) infinite;
  }

  /* Title glitch fires at same time but slightly offset offsets */
  #title .glitch-word::before { animation-delay: 0.4s; }
  #title .glitch-word::after  { animation-delay: 0.4s; }

  /* Byline glitch fires offset */
  #byline .glitch-word::before { animation-delay: 0.9s; }
  #byline .glitch-word::after  { animation-delay: 0.9s; }

  @keyframes glitchTop {
    0%,  94%  { opacity: 0; transform: translate(0,0); }
    95%        { opacity: 1; transform: translate(-3px, -2px); clip-path: inset(15% 0 55% 0); }
    96%        { opacity: 1; transform: translate(3px, 1px);  clip-path: inset(40% 0 30% 0); }
    97%        { opacity: 1; transform: translate(-2px, 0);   clip-path: inset(5%  0 70% 0); }
    98%, 100%  { opacity: 0; transform: translate(0,0); }
  }

  @keyframes glitchBot {
    0%,  94%  { opacity: 0; transform: translate(0,0); }
    95%        { opacity: 1; transform: translate(3px, 2px);  clip-path: inset(55% 0 10% 0); }
    96%        { opacity: 1; transform: translate(-3px, -1px);clip-path: inset(70% 0 5%  0); }
    97%        { opacity: 1; transform: translate(2px, 0);    clip-path: inset(50% 0 25% 0); }
    98%, 100%  { opacity: 0; transform: translate(0,0); }
  }

  /* ── SCANLINE FLICKER ───────────────────────────── */
  #scanlines {
    position: fixed;
    inset: 0;
    z-index: 3;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.04) 3px,
      rgba(0,0,0,0.04) 4px
    );
  }

  /* ── EXIT FADE ──────────────────────────────────── */
  body.exiting {
    animation: exitFade 0.7s ease-in forwards;
  }
  @keyframes exitFade {
    to { opacity: 0; }
  }

  /* ── RESPONSIVE ─────────────────────────────────── */
  @media (max-width: 480px) {
    #welcome { letter-spacing: 0.2em; }
    #byline  { margin-bottom: 40px; }
    #enter-btn .btn-inner { padding: 14px 36px; font-size: 0.9rem; }
  }
</style>
</head>
<body>

<!-- Background floating image -->
<div id="bg-image"></div>

<!-- Overlay layers -->
<div id="vignette"></div>
<div id="grain"></div>
<div id="scanlines"></div>

<!-- Center content -->
<div id="stage">

  <div id="welcome">Welcome To:</div>

  <h1 id="title">
    <span class="glitch-word" data-text="Hatty's">Hatty's</span>
    <span class="plain"> Tools</span>
  </h1>

  <p id="byline">
    Created by&nbsp;
    <span class="glitch-word" data-text="HattyHats">HattyHats</span>
  </p>

  <button id="enter-btn" aria-label="Enter Hatty's Tools">
    <span class="btn-inner">
      Enter
      <span class="btn-arrow">→</span>
    </span>
  </button>

</div>

<script>
  // Clicking Enter fades out then navigates
  document.getElementById('enter-btn').addEventListener('click', function () {
    document.body.classList.add('exiting');
    setTimeout(function () {
      window.location.href = 'index.html';
    }, 680);
  });

  // Also allow pressing Enter or Space key
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Enter' || e.key === ' ') {
      document.getElementById('enter-btn').click();
    }
  });
</script>

</body>
</html>
